services:
  backend:
    build:
      context: ./backend
    environment:
      - PORT=8000
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      # Choose one:
      # (A) Put CSVs in backend/ (recommended for now)
      # or (B) Provide URLs to download them on boot
      - ALBERT_CSV_PATH=/app/Albert_Master_Definitive.csv
      - HCI_CSV_PATH=/app/HCI_Master_Definitive.csv
      # Optional:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    command: sh -lc "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    depends_on:
      - backend
